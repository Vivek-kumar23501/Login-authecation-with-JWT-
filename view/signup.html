<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Signup | Vivek Auth</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>

<body class="min-h-screen bg-gradient-to-br from-indigo-600 via-blue-500 to-purple-600 flex items-center justify-center p-4">

  <div class="w-full max-w-6xl bg-white rounded-3xl shadow-2xl flex flex-col md:flex-row overflow-hidden">

    <!-- Left Branding -->
    <div class="w-full md:w-1/2 bg-gradient-to-b from-indigo-700 to-blue-600 text-white p-8 md:p-12 flex flex-col justify-between">
      
      <div>
        <h1 class="text-3xl md:text-4xl font-bold mb-4">Authentication System 🔐</h1>
        <p class="text-sm md:text-lg opacity-90">
          Secure, fast and modern authentication platform built using MERN Stack.
        </p>
      </div>

      <div class="bg-white/10 p-4 rounded-lg my-6 md:my-0 text-sm md:text-base">
        <p>✔ Secure Password Hashing</p>
        <p>✔ JWT Authentication</p>
        <p>✔ Role Based Access</p>
      </div>

      <div>
        <p class="text-sm opacity-80">Developed By</p>
        <h2 class="text-xl md:text-2xl font-semibold">Vivek Tiwari</h2>
      </div>

    </div>

    <!-- Right Form -->
    <div class="w-full md:w-1/2 p-6 md:p-10">

      <h2 class="text-2xl md:text-3xl font-bold text-center text-gray-800 mb-2">
        Create Account
      </h2>
      <p class="text-center text-gray-500 mb-6 md:mb-8 text-sm md:text-base">
        Join the platform and start your journey 🚀
      </p>

      <!-- ✅ Only UI + event pass -->
      <form class="space-y-5" onsubmit="signup(event)">

        <div>
          <label class="text-sm text-gray-600">Full Name</label>
          <input type="text" name="fullname"
            class="w-full mt-1 px-4 py-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none"
            placeholder="Enter your name" required>
        </div>

        <div>
          <label class="text-sm text-gray-600">Email</label>
          <input type="email" name="email"
            class="w-full mt-1 px-4 py-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none"
            placeholder="Enter your email" required>
        </div>

        <div>
          <label class="text-sm text-gray-600">Mobile</label>
          <input type="text" name="mobile"
            class="w-full mt-1 px-4 py-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none"
            placeholder="Enter mobile number" required>
        </div>

        <div>
          <label class="text-sm text-gray-600">Password</label>
          <input type="password" name="password"
            class="w-full mt-1 px-4 py-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none"
            placeholder="Enter password" required>
        </div>

        <button
          class="w-full bg-indigo-600 text-white py-3 rounded-lg font-semibold hover:bg-indigo-700 transition">
          Sign Up
        </button>
      </form>

      <p class="text-center text-gray-500 mt-6">
        Already have an account?
        <a href="index.html" class="text-indigo-600 font-semibold hover:underline">Login</a>
      </p>

    </div>

  </div>

  <!-- ✅ Only linked JS file -->
  <script src="./js/signup.js"></script>

</body>
</html>
