<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | Vivek Auth</title>
  <script src="https://cdn.tailwindcss.com"></script>
   <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>

<body class="min-h-screen bg-gradient-to-br from-green-500 via-emerald-500 to-teal-600 flex items-center justify-center p-4">

  <div class="w-full max-w-6xl bg-white rounded-3xl shadow-2xl flex flex-col md:flex-row overflow-hidden">

    <!-- Left Branding -->
    <div class="w-full md:w-1/2 bg-gradient-to-b from-green-600 to-emerald-500 text-white p-8 md:p-12 flex flex-col justify-between">

      <div>
        <h1 class="text-3xl md:text-4xl font-bold mb-4">Welcome Back 👋</h1>
        <p class="text-sm md:text-lg opacity-90">
          Login to continue your secure session and access your dashboard.
        </p>
      </div>

      <div class="bg-white/10 p-4 rounded-lg my-6 md:my-0 text-sm md:text-base">
        <p>✔ Secure Login</p>
        <p>✔ JWT Token System</p>
        <p>✔ Fast & Reliable</p>
      </div>

      <div>
        <p class="text-sm opacity-80">Authentication by</p>
        <h2 class="text-xl md:text-2xl font-semibold">Vivek Tiwari</h2>
      </div>

    </div>

    <!-- Right Form -->
    <div class="w-full md:w-1/2 p-6 md:p-10">

      <h2 class="text-2xl md:text-3xl font-bold text-center text-gray-800 mb-2">
        Login
      </h2>
      <p class="text-center text-gray-500 mb-6 md:mb-8 text-sm md:text-base">
        Access your account securely 🔐
      </p>

      <!-- ✅ Only UI + event -->
      <form class="space-y-5" onsubmit="login(event)">

        <div>
          <label class="text-sm text-gray-600">Email</label>
          <input type="email" name="email"
            class="w-full mt-1 px-4 py-3 border rounded-lg focus:ring-2 focus:ring-green-500 outline-none"
            placeholder="Enter your email" required>
        </div>

        <div>
          <label class="text-sm text-gray-600">Password</label>
          <input type="password" name="password"
            class="w-full mt-1 px-4 py-3 border rounded-lg focus:ring-2 focus:ring-green-500 outline-none"
            placeholder="Enter password" required>
        </div>

        <button
          class="w-full bg-green-600 text-white py-3 rounded-lg font-semibold hover:bg-green-700 transition">
          Login
        </button>
      </form>

      <p class="text-center text-gray-500 mt-6">
        Don’t have an account?
        <a href="signup.html" class="text-green-600 font-semibold hover:underline">Sign Up</a>
      </p>

    </div>

  </div>

  <!-- ✅ JS file linked -->
  <script src="./js/login.js"></script>

</body>
</html>
